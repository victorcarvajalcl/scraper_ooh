<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCRAPER_OOH - Nivel Empresa</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:380px;background:#0b1324;padding:15px;overflow:auto}
.panel{margin-bottom:15px}
input,select{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none}
.map-wrap{flex:1}
#map{height:100%}
.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}
.ranking-item{background:#0a1b3a;padding:10px;border-radius:10px;margin-bottom:6px}
</style>
</head>
<body>

<div class="app">
<div class="sidebar">
<h2>SCRAPER_OOH</h2>

<div class="panel">
<h3>Resumen</h3>
<div class="stat">Soportes: <b id="totalSoportes">0</b></div>
<div class="stat">Comunas activas: <b id="totalComunas">0</b></div>
<div class="stat">Score máximo: <b id="topScore">0</b></div>
</div>

<div class="panel">
<h3>Insight</h3>
<div id="insight"></div>
</div>

<div class="panel">
<input id="search" placeholder="Buscar">
<select id="comuna"></select>
<select id="categoria"></select>
<select id="modo">
<option value="auto">Auto</option>
<option value="h6">H6</option>
<option value="h8">H8</option>
</select>
</div>

<div class="panel">
<h3>Top zonas</h3>
<div id="ranking"></div>
</div>

</div>

<div class="map-wrap"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map=L.map('map').setView([-33.45,-70.66],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

map.createPane('hex');map.getPane('hex').style.zIndex=400;map.getPane('hex').style.pointerEvents='none';
map.createPane('points');map.getPane('points').style.zIndex=650;

let soportes=[],filtrados=[];
let h6,h8;
let capaPts=L.markerClusterGroup();
let capaComunas;

function score(s){if(s>=20)return 100;if(s>=10)return 60;if(s>=5)return 30;if(s>=1)return 10;return 0}

function insight(s){
if(s>=100)return "Alta saturación comercial";
if(s>=60)return "Zona fuerte";
return "Oportunidad de crecimiento";
}

fetch('data/soportes_h3.json').then(r=>r.json()).then(d=>{
soportes=d;filtrados=d;init();render();
});
fetch('data/h6.geojson').then(r=>r.json()).then(d=>h6=d);
fetch('data/h8.geojson').then(r=>r.json()).then(d=>h8=d);
fetch('data/comunas.geojson').then(r=>r.json()).then(d=>{
capaComunas=L.geoJSON(d,{style:{color:'#111',weight:1,fillOpacity:0},
onEachFeature:(f,l)=>{
const n=f.properties.Comuna||f.properties.NOM_COM;
l.bindTooltip(n);
l.on('mouseover',()=>l.setStyle({color:'#22c55e',weight:3,fillOpacity:0.1,fillColor:'#22c55e'}));
l.on('mouseout',()=>capaComunas.resetStyle(l));
l.on('click',()=>map.fitBounds(l.getBounds()));
}}).addTo(map);
});

function init(){
const c=[...new Set(soportes.map(s=>s.comuna))];
const cat=[...new Set(soportes.map(s=>s.categoria))];

const sc=document.getElementById('comuna');
sc.innerHTML='<option value="">Todas</option>';
c.forEach(x=>sc.innerHTML+=`<option>${x}</option>`);

const sc2=document.getElementById('categoria');
sc2.innerHTML='<option value="">Todas</option>';
cat.forEach(x=>sc2.innerHTML+=`<option>${x}</option>`);

['search','comuna','categoria'].forEach(id=>document.getElementById(id).addEventListener('input',filtrar));
}

function filtrar(){
const q=document.getElementById('search').value.toLowerCase();
const c=document.getElementById('comuna').value;
const cat=document.getElementById('categoria').value;
filtrados=soportes.filter(s=>
(!q||(s.nombre||'').toLowerCase().includes(q))&&
(!c||s.comuna===c)&&
(!cat||s.categoria===cat)
);
render();
}

function render(){
map.removeLayer(capaPts);
capaPts=L.markerClusterGroup();

filtrados.forEach(p=>{
const m=L.circleMarker([p.lat,p.lng],{pane:'points',radius:5,color:'#fff',fillColor:'#ef4444',fillOpacity:1});
m.bindPopup(`<b>${p.nombre}</b><br>${p.comuna}`);
capaPts.addLayer(m);
});

map.addLayer(capaPts);
renderHex();
}

function renderHex(){
if(!h6||!h8)return;

let feats=(h6.features||[]);
const top=feats.map(f=>({...f,s:score(f.properties.soportes||0)})).sort((a,b)=>b.s-a.s).slice(0,5);

const div=document.getElementById('ranking');div.innerHTML='';
top.forEach((f,i)=>div.innerHTML+=`<div class="ranking-item">#${i+1} Score ${f.s}</div>`);

const max=top[0]?.s||0;
document.getElementById('topScore').innerText=max;
document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalComunas').innerText=new Set(filtrados.map(s=>s.comuna)).size;
document.getElementById('insight').innerText=insight(max);
}

map.on('zoomend',renderHex);
</script>

</body>
</html>
