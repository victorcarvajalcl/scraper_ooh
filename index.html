<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCRAPER_OOH - Análisis PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body{margin:0;font-family:Arial;background:#0b1220;color:#fff}
.app{display:flex;height:100vh}
.sidebar{width:400px;background:#0b1324;padding:15px;overflow:auto}
.panel{margin-bottom:18px}
input,select,button{width:100%;padding:10px;margin-bottom:10px;border-radius:10px;background:#091a36;color:#fff;border:none}
.map-wrap{flex:1}
#map{height:100%}
.stat{background:#081a3b;padding:10px;border-radius:10px;margin-bottom:8px}
.ranking-item{background:#0a1b3a;padding:10px;border-radius:10px;margin-bottom:6px}
.chips{display:flex;gap:8px;flex-wrap:wrap}
.chip{padding:8px 12px;background:#0a1b3a;border-radius:999px;cursor:pointer}
.chip.active{background:#2563eb}
</style>
</head>
<body>

<div class="app">
<div class="sidebar">
<h2>SCRAPER_OOH PRO</h2>

<div class="panel">
<h3>Resumen Análisis</h3>
<div class="stat">Soportes filtrados: <b id="totalSoportes">0</b></div>
<div class="stat">Comunas activas: <b id="totalComunas">0</b></div>
<div class="stat">Score promedio: <b id="avgScore">0</b></div>
<div class="stat">Score máximo: <b id="topScore">0</b></div>
</div>

<div class="panel">
<h3>Insight</h3>
<div id="insight"></div>
</div>

<div class="panel">
<h3>Filtros</h3>
<input id="search" placeholder="Buscar soporte">
<select id="comuna"></select>
<select id="categoria"></select>
<button id="reset">Reset</button>
</div>

<div class="panel">
<h3>Capas</h3>
<div class="chips">
<div class="chip active" data-layer="soportes">Soportes</div>
<div class="chip active" data-layer="h6">H6</div>
<div class="chip" data-layer="h8">H8</div>
<div class="chip active" data-layer="comunas">Comunas</div>
</div>
</div>

<div class="panel">
<h3>Top zonas</h3>
<div id="ranking"></div>
</div>

</div>

<div class="map-wrap"><div id="map"></div></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map=L.map('map').setView([-33.45,-70.66],11);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

map.createPane('hex');map.getPane('hex').style.zIndex=400;map.getPane('hex').style.pointerEvents='none';
map.createPane('points');map.getPane('points').style.zIndex=650;

let soportes=[],filtrados=[];
let h6,h8;
let capaPts=L.markerClusterGroup();
let capaH6,capaH8,capaComunas;

const layersState={soportes:true,h6:true,h8:false,comunas:true};

function score(s){if(s>=20)return 100;if(s>=10)return 60;if(s>=5)return 30;if(s>=1)return 10;return 0}
function insight(s){if(s>=100)return "Alta saturación";if(s>=60)return "Zona fuerte";return "Oportunidad"}

fetch('data/soportes_h3.json').then(r=>r.json()).then(d=>{
soportes=d;filtrados=d;init();render();
});
fetch('data/h6.geojson').then(r=>r.json()).then(d=>h6=d);
fetch('data/h8.geojson').then(r=>r.json()).then(d=>h8=d);
fetch('data/comunas.geojson').then(r=>r.json()).then(d=>{
capaComunas=L.geoJSON(d,{style:{color:'#111',weight:1,fillOpacity:0},onEachFeature:(f,l)=>{
const n=f.properties.Comuna||f.properties.NOM_COM;
l.bindTooltip(n);
l.on('mouseover',()=>l.setStyle({color:'#22c55e',weight:3,fillOpacity:0.1,fillColor:'#22c55e'}));
l.on('mouseout',()=>capaComunas.resetStyle(l));
}});
if(layersState.comunas) capaComunas.addTo(map);
});

function init(){
const c=[...new Set(soportes.map(s=>s.comuna))];
const cat=[...new Set(soportes.map(s=>s.categoria))];

const sc=document.getElementById('comuna');
sc.innerHTML='<option value="">Todas</option>';
c.forEach(x=>sc.innerHTML+=`<option>${x}</option>`);

const sc2=document.getElementById('categoria');
sc2.innerHTML='<option value="">Todas</option>';
cat.forEach(x=>sc2.innerHTML+=`<option>${x}</option>`);

['search','comuna','categoria'].forEach(id=>document.getElementById(id).addEventListener('input',filtrar));

document.getElementById('reset').onclick=()=>{
filtrados=soportes;
document.getElementById('search').value='';
document.getElementById('comuna').value='';
document.getElementById('categoria').value='';
render();
};

Array.from(document.querySelectorAll('.chip')).forEach(chip=>{
chip.onclick=()=>{
const k=chip.dataset.layer;
layersState[k]=!layersState[k];
chip.classList.toggle('active',layersState[k]);
render();
};
});
}

function filtrar(){
const q=document.getElementById('search').value.toLowerCase();
const c=document.getElementById('comuna').value;
const cat=document.getElementById('categoria').value;
filtrados=soportes.filter(s=>(!q||(s.nombre||'').toLowerCase().includes(q))&&(!c||s.comuna===c)&&(!cat||s.categoria===cat));
render();
}

function render(){
map.removeLayer(capaPts);
capaPts=L.markerClusterGroup();

if(layersState.soportes){
filtrados.forEach(p=>{
const m=L.circleMarker([p.lat,p.lng],{pane:'points',radius:5,color:'#fff',fillColor:'#ef4444',fillOpacity:1});

m.bindPopup(`
<b>${p.nombre||'Soporte'}</b><br>
Dirección: ${p.direccion||'-'}<br>
Comuna: ${p.comuna||'-'}<br>
Categoría: ${p.categoria||'-'}
`);

capaPts.addLayer(m);
});
map.addLayer(capaPts);
}

if(capaComunas){
if(layersState.comunas && !map.hasLayer(capaComunas)) map.addLayer(capaComunas);
if(!layersState.comunas && map.hasLayer(capaComunas)) map.removeLayer(capaComunas);
}

renderHex();
}

function renderHex(){
if(capaH6) map.removeLayer(capaH6);
if(capaH8) map.removeLayer(capaH8);

let feats=[];

if(layersState.h6 && h6){
feats=h6.features;
capaH6=L.geoJSON(h6,{pane:'hex',style:f=>({color:'#2563eb',fillOpacity:0.3}),
onEachFeature:(f,l)=>{
const s=score(f.properties.soportes||0);
l.bindPopup(`H6<br>Soportes:${f.properties.soportes||0}<br>Score:${s}`);
}
}).addTo(map);
}

if(layersState.h8 && h8){
feats=h8.features;
capaH8=L.geoJSON(h8,{pane:'hex',style:f=>({color:'#9333ea',fillOpacity:0.25}),
onEachFeature:(f,l)=>{
const s=score(f.properties.soportes||0);
l.bindPopup(`H8<br>Soportes:${f.properties.soportes||0}<br>Score:${s}`);
}
}).addTo(map);
}

const top=feats.map(f=>({...f,s:score(f.properties.soportes||0)})).sort((a,b)=>b.s-a.s).slice(0,5);

const div=document.getElementById('ranking');div.innerHTML='';
top.forEach((f,i)=>div.innerHTML+=`<div class="ranking-item">#${i+1} Score ${f.s}</div>`);

const max=top[0]?.s||0;
const avg = top.length ? Math.round(top.reduce((a,b)=>a+b.s,0)/top.length) : 0;

document.getElementById('topScore').innerText=max;
document.getElementById('avgScore').innerText=avg;
document.getElementById('totalSoportes').innerText=filtrados.length;
document.getElementById('totalComunas').innerText=new Set(filtrados.map(s=>s.comuna)).size;
document.getElementById('insight').innerText=insight(max);
}

map.on('zoomend',renderHex);
</script>

</body>
</html>
