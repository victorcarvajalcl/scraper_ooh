<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SCRAPER_OOH - Comercial</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Arial, sans-serif; background: #0b1220; color: white; overflow: hidden; }
    .app { display: flex; width: 100vw; height: 100vh; }
    .sidebar { width: 370px; background: linear-gradient(180deg, #071224 0%, #0b1324 100%); padding: 20px 18px; overflow-y: auto; border-right: 1px solid rgba(255,255,255,0.08); }
    .sidebar h1 { margin: 0 0 8px; font-size: 26px; }
    .subtitle { color: #b8c4d9; font-size: 14px; margin-bottom: 24px; }
    .panel { background: rgba(7,20,40,0.95); border-radius: 18px; padding: 18px; margin-bottom: 18px; }
    label { font-size: 13px; display:block; margin-bottom:6px; }
    input, select, button { width:100%; padding:12px; border-radius:12px; background:#091a36; color:white; margin-bottom:12px; }
    .chips { display:flex; gap:10px; flex-wrap:wrap; }
    .chip { padding:8px 12px; border-radius:999px; background:#0a1b3a; cursor:pointer; }
    .chip.active { background:#2563eb; }
    .map-wrap { flex:1; position:relative; }
    #map { width:100%; height:100%; }
  </style>
</head>
<body>

<div class="app">
  <aside class="sidebar">
    <h1>SCRAPER_OOH</h1>
    <div class="subtitle">Lectura territorial comercial</div>

    <div class="panel">
      <label>Resolución</label>
      <select id="resolucionSelect">
        <option value="auto">Automática</option>
        <option value="h6">H6</option>
        <option value="h8">H8</option>
      </select>
    </div>

    <div class="panel">
      <div class="chips">
        <div class="chip active" data-layer="h6">H6</div>
        <div class="chip active" data-layer="h8">H8</div>
        <div class="chip active" data-layer="soportes">Soportes</div>
      </div>
    </div>
  </aside>

  <div class="map-wrap">
    <div id="map"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map = L.map('map').setView([-33.45, -70.66], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

// ==========================
// 🔥 PANES (FIX REAL)
// ==========================
map.createPane('paneHex');
map.getPane('paneHex').style.zIndex = 400;
map.getPane('paneHex').style.pointerEvents = 'none';

map.createPane('paneMarkers');
map.getPane('paneMarkers').style.zIndex = 650;

// ==========================

let capaSoportes = L.markerClusterGroup();
let capaH6, capaH8;

function styleH6(){
  return { pane:'paneHex', color:'#2563eb', weight:1, fillColor:'#3b82f6', fillOpacity:0.25 };
}

function styleH8(){
  return { pane:'paneHex', color:'#9333ea', weight:1, fillColor:'#a855f7', fillOpacity:0.20 };
}

fetch('data/soportes_h3.json').then(r=>r.json()).then(data=>{
  data.forEach(p=>{
    const m = L.circleMarker([p.lat,p.lng],{
      pane:'paneMarkers',
      radius:5,
      color:'#fff',
      fillColor:'#ef4444',
      fillOpacity:1
    });
    capaSoportes.addLayer(m);
  });
  map.addLayer(capaSoportes);
});

fetch('data/h6.geojson').then(r=>r.json()).then(data=>{
  capaH6 = L.geoJSON(data,{ pane:'paneHex', style:styleH6 }).addTo(map);
});

fetch('data/h8.geojson').then(r=>r.json()).then(data=>{
  capaH8 = L.geoJSON(data,{ pane:'paneHex', style:styleH8 }).addTo(map);
});

</script>
</body>
</html>
