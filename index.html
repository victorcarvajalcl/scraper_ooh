<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mapa OOH - H6 / H8</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { margin: 0; font-family: Arial; }
    #map { height: 100vh; }
  </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([-33.45, -70.66], 11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '&copy; OpenStreetMap &copy; CARTO'
}).addTo(map);

// ============================
// CAPAS
// ============================

let capaComunas = L.geoJSON(null, {
  style: {
    color: "#1f2937",
    weight: 1.2,
    fillOpacity: 0
  }
});

let capaSoportes = L.layerGroup();

let capaH6;
let capaH8;

// ============================
// CARGA DE DATOS
// ============================

Promise.all([
  fetch("data/comunas.geojson").then(r => r.json()),
  fetch("data/soportes_h3.json").then(r => r.json()),
  fetch("data/h6.geojson").then(r => r.json()),
  fetch("data/h8.geojson").then(r => r.json())
])
.then(([comunas, soportes, h6, h8]) => {

  // ============================
  // COMUNAS
  // ============================
  capaComunas.addData(comunas).addTo(map);

  // ============================
  // SOPORTES
  // ============================
  soportes.forEach(p => {
    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 3,
      color: "#ef4444",
      fillOpacity: 0.9
    });

    marker.bindPopup(`
      <b>Soporte</b><br>
      ${p.direccion || ''}
    `);

    capaSoportes.addLayer(marker);
  });

  capaSoportes.addTo(map);

  // ============================
  // H6
  // ============================
  capaH6 = L.geoJSON(h6, {
    style: f => {
      const s = Number(f.properties.soportes || 0);

      let color = "#93c5fd";
      if (s >= 5) color = "#60a5fa";
      if (s >= 10) color = "#3b82f6";
      if (s >= 20) color = "#1d4ed8";

      return {
        color: "#2563eb",
        weight: 1,
        fillColor: color,
        fillOpacity: 0.35
      };
    },
    onEachFeature: (f, layer) => {
      layer.bindPopup(`
        <b>H6</b><br>
        Soportes: ${f.properties.soportes || 0}
      `);
    }
  }).addTo(map);

  // ============================
  // H8
  // ============================
  capaH8 = L.geoJSON(h8, {
    style: f => {
      const s = Number(f.properties.soportes || 0);

      let color = "#e9d5ff";
      if (s >= 2) color = "#d8b4fe";
      if (s >= 5) color = "#c084fc";
      if (s >= 10) color = "#a855f7";

      return {
        color: "#9333ea",
        weight: 0.8,
        fillColor: color,
        fillOpacity: 0.3
      };
    },
    onEachFeature: (f, layer) => {
      layer.bindPopup(`
        <b>H8</b><br>
        Soportes: ${f.properties.soportes || 0}
      `);
    }
  });

  // ============================
  // CONTROL CAPAS
  // ============================

  const overlays = {
    "Comunas": capaComunas,
    "Soportes": capaSoportes,
    "Malla H6": capaH6,
    "Malla H8": capaH8
  };

  L.control.layers(null, overlays, { collapsed: false }).addTo(map);

});
</script>

</body>
</html>
