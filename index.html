<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCRAPER_OOH PRO</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<style>
body { margin:0; font-family:Arial; display:flex; }

#sidebar {
  width:360px;
  background:#0b1220;
  color:white;
  padding:15px;
  overflow:auto;
}

#map { flex:1; height:100vh; }

.panel { margin-bottom:20px; }
.panel h3 { margin-bottom:10px; }

.ranking-item {
  background:#081a3b;
  padding:10px;
  margin-bottom:8px;
  cursor:pointer;
  border-radius:10px;
}

button { width:100%; padding:10px; }

.leaflet-interactive:hover {
  fill-opacity:0.6 !important;
}
</style>
</head>

<body>

<div id="sidebar">

<h2>SCRAPER_OOH</h2>

<div class="panel">
<h3>Resumen</h3>
<div id="stats"></div>
</div>

<div class="panel">
<h3>Filtros</h3>
<input id="search" placeholder="Buscar">
<select id="comuna"></select>
<button id="export">Exportar CSV</button>
</div>

<div class="panel">
<h3>Top H6</h3>
<div id="rankH6"></div>
</div>

<div class="panel">
<h3>Top H8</h3>
<div id="rankH8"></div>
</div>

<div class="panel">
<h3>Top Comunas</h3>
<div id="rankComunas"></div>
</div>

</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<script>
const map = L.map('map').setView([-33.45,-70.66],11);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png').addTo(map);

let h6Geo, h8Geo, soportes, comunas;

let cluster = L.markerClusterGroup();
let capaComunas, capaH6, capaH8;

// ================= LOAD
Promise.all([
 fetch("data/h6.geojson").then(r=>r.json()),
 fetch("data/h8.geojson").then(r=>r.json()),
 fetch("data/soportes_h3.json").then(r=>r.json()),
 fetch("data/comunas.geojson").then(r=>r.json())
]).then(([h6,h8,s,c])=>{
 h6Geo=h6;
 h8Geo=h8;
 soportes=s;
 comunas=c;

 init();
});

// ================= INIT
function init(){

 // comunas
 capaComunas=L.geoJSON(comunas,{
  style:{color:"#000",weight:1,fillOpacity:0},
  onEachFeature:(f,l)=>{
   l.on("click",()=>map.fitBounds(l.getBounds()));
  }
 }).addTo(map);

 // puntos
 soportes.forEach(p=>{
  if(!p.lat||!p.lng)return;
  cluster.addLayer(L.circleMarker([p.lat,p.lng]));
 });
 map.addLayer(cluster);

 map.on("moveend zoomend",renderHex);
 renderHex();
 renderRankings();
 renderComunas();
}

// ================= HEX
function renderHex(){
 if(capaH6) map.removeLayer(capaH6);
 if(capaH8) map.removeLayer(capaH8);

 let bounds=map.getBounds();
 let zoom=map.getZoom();

 let geo=(zoom<13)?h6Geo:h8Geo;

 let filtered=geo.features.filter(f=>{
  return bounds.intersects(L.geoJSON(f).getBounds());
 });

 let layer=L.geoJSON(filtered,{
  style:f=>{
   let s=f.properties.soportes||0;
   let c="#93c5fd";
   if(s>5)c="#60a5fa";
   if(s>10)c="#3b82f6";
   return {color:"#2563eb",fillColor:c,fillOpacity:0.3};
  },
  onEachFeature:(f,l)=>{
   l.on("click",()=>map.fitBounds(l.getBounds()));
  }
 }).addTo(map);

 if(zoom<13) capaH6=layer;
 else capaH8=layer;

 renderRankings();
}

// ================= SCORE
function score(f){
 let s=f.properties.soportes||0;
 return s>=20?s*2:s>=10?s*1.5:s;
}

// ================= RANKINGS
function renderRankings(){

 renderRank(h6Geo.features,"rankH6");
 renderRank(h8Geo.features,"rankH8");
}

function renderRank(features,id){
 let container=document.getElementById(id);
 container.innerHTML="";

 let bounds=map.getBounds();

 let list=features
 .filter(f=>bounds.intersects(L.geoJSON(f).getBounds()))
 .map(f=>({...f,score:score(f)}))
 .sort((a,b)=>b.score-a.score)
 .slice(0,5);

 list.forEach((f,i)=>{
  let div=document.createElement("div");
  div.className="ranking-item";
  div.innerHTML=`#${i+1} Score:${f.score}`;
  div.onclick=()=>map.fitBounds(L.geoJSON(f).getBounds());
  container.appendChild(div);
 });
}

// ================= COMUNAS
function renderComunas(){
 let c={};
 soportes.forEach(s=>{
  c[s.comuna]=(c[s.comuna]||0)+1;
 });

 let list=Object.entries(c)
 .sort((a,b)=>b[1]-a[1])
 .slice(0,5);

 let container=document.getElementById("rankComunas");
 list.forEach(([k,v],i)=>{
  let div=document.createElement("div");
  div.className="ranking-item";
  div.innerHTML=`#${i+1} ${k} (${v})`;
  container.appendChild(div);
 });
}

// ================= EXPORT
document.getElementById("export").onclick=()=>{
 let csv="lat,lng\n";
 soportes.forEach(s=>{
  csv+=`${s.lat},${s.lng}\n`;
 });

 let blob=new Blob([csv]);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(blob);
 a.download="data.csv";
 a.click();
}
</script>

</body>
</html>
