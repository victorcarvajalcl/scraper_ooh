<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa OOH Pro</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    html, body { margin:0; height:100%; font-family: Arial, sans-serif; }
    #app { display:grid; grid-template-columns: 350px 1fr; height:100%; }
    #sidebar {
      background:#0f172a;
      color:white;
      padding:20px;
      overflow:auto;
    }
    #map { width:100%; height:100%; }
    .card {
      background:#111827;
      border:1px solid #1f2937;
      border-radius:14px;
      padding:14px;
      margin-bottom:14px;
    }
    .input, .select, .button {
      width:100%;
      padding:10px 12px;
      border-radius:10px;
      border:1px solid #334155;
      background:#0b1220;
      color:white;
      margin-top:6px;
      margin-bottom:10px;
    }
    .button {
      background:#2563eb;
      border:none;
      cursor:pointer;
      font-weight:bold;
    }
    .stat {
      font-size:28px;
      font-weight:bold;
      margin-top:5px;
    }
    .muted {
      color:#94a3b8;
      font-size:13px;
    }
    .legend {
      background:white;
      padding:10px 12px;
      border-radius:12px;
      line-height:1.6;
      box-shadow:0 8px 24px rgba(0,0,0,.15);
      font-size:13px;
    }
    .dot {
      display:inline-block;
      width:10px;
      height:10px;
      border-radius:50%;
      margin-right:8px;
    }
    @media (max-width: 900px){
      #app {
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr;
      }
      #sidebar {
        max-height: 42vh;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <h1>Mapa OOH Pro</h1>
      <p class="muted">Explora soportes por categoría, comuna y densidad territorial.</p>

      <div class="card">
        <div class="muted">Soportes visibles</div>
        <div class="stat" id="statSoportes">0</div>
        <div class="muted" style="margin-top:10px;">Hexágonos visibles</div>
        <div class="stat" id="statHex">0</div>
      </div>

      <div class="card">
        <label class="muted">Buscar soporte</label>
        <input id="searchInput" class="input" placeholder="Ej: Metro, Parque Arauco..." />

        <label class="muted">Filtrar por comuna</label>
        <select id="comunaFilter" class="select">
          <option value="">Todas</option>
        </select>

        <label class="muted">Filtrar por categoría</label>
        <select id="categoriaFilter" class="select">
          <option value="">Todas</option>
        </select>

        <label class="muted">Resolución visible</label>
        <select id="resolutionMode" class="select">
          <option value="auto">Automática por zoom</option>
          <option value="h6">Solo H6</option>
          <option value="h8">Solo H8</option>
          <option value="points">Solo soportes</option>
        </select>

        <button id="resetBtn" class="button">Restablecer vista</button>
      </div>

      <div class="card">
        <div class="muted">Cómo leer el mapa</div>
        <ul style="padding-left:18px; line-height:1.6;">
          <li><b>H6:</b> visión comercial / macrozona</li>
          <li><b>H8:</b> visión táctica / detalle</li>
          <li><b>Puntos:</b> soportes individuales</li>
          <li><b>Colores:</b> densidad de soportes</li>
        </ul>
      </div>
    </aside>

    <main id="map"></main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="https://unpkg.com/h3-js@4.1.0/dist/h3-js.umd.js"></script>

  <script>
    const map = L.map('map').setView([-33.45, -70.65], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; OpenStreetMap &copy; CARTO',
      maxZoom: 20
    }).addTo(map);

    const h6Layer = L.layerGroup().addTo(map);
    const h8Layer = L.layerGroup();
    const pointsLayer = L.markerClusterGroup();

    let allData = [];
    let currentData = [];

    function getColor(count){
      return count > 300 ? '#dc2626' :
             count > 100 ? '#f97316' :
             count > 30  ? '#eab308' :
                           '#22c55e';
    }

    function polygonFromH3(cell){
      return h3.cellToBoundary(cell, true).map(([lat, lng]) => [lat, lng]);
    }

    async function loadData(){
      const res = await fetch('./data/soportes_h3.json');
      allData = await res.json();

      // Si no trae h6/h8 desde Python, los calculamos acá
      allData = allData.map(item => ({
        ...item,
        h6: item.h6 || h3.latLngToCell(item.lat, item.lng, 6),
        h8: item.h8 || h3.latLngToCell(item.lat, item.lng, 8)
      }));

      currentData = [...allData];

      buildFilters();
      renderAll();
    }

    function buildFilters(){
      const comunaSelect = document.getElementById('comunaFilter');
      const categoriaSelect = document.getElementById('categoriaFilter');

      const comunas = [...new Set(allData.map(x => x.comuna || 'Sin comuna'))].sort();
      const categorias = [...new Set(allData.map(x => x.categoria || 'Otros'))].sort();

      comunas.forEach(c => {
        const op = document.createElement('option');
        op.value = c;
        op.textContent = c;
        comunaSelect.appendChild(op);
      });

      categorias.forEach(c => {
        const op = document.createElement('option');
        op.value = c;
        op.textContent = c;
        categoriaSelect.appendChild(op);
      });
    }

    function aggregate(data, key){
      const mapData = new Map();

      data.forEach(item => {
        const k = item[key];
        if(!mapData.has(k)){
          mapData.set(k, { cell:k, count:0, items:[] });
        }
        const obj = mapData.get(k);
        obj.count++;
        obj.items.push(item);
      });

      return [...mapData.values()];
    }

    function renderHex(layer, groups, label){
      layer.clearLayers();

      groups.forEach(g => {
        L.polygon(polygonFromH3(g.cell), {
          color: getColor(g.count),
          fillColor: getColor(g.count),
          fillOpacity: 0.25,
          weight: 1.5
        })
        .bindPopup(`
          <b>${label}</b>: ${g.cell}<br>
          <b>Soportes</b>: ${g.count}
        `)
        .addTo(layer);
      });
    }

    function renderPoints(data){
      pointsLayer.clearLayers();

      data.forEach(p => {
        const colorMap = {
          "Letrero Publicitario": "#2563eb",
          "Pantallas Digitales": "#dc2626",
          "Metro": "#16a34a",
          "Bus": "#9333ea",
          "Centro Comercial": "#ea580c",
          "Indoor": "#0891b2",
          "No tradicional": "#64748b",
          "Otros": "#111827"
        };

        const color = colorMap[p.categoria] || "#0f172a";

        L.circleMarker([p.lat, p.lng], {
          radius: 5,
          color: color,
          fillColor: color,
          fillOpacity: 0.85,
          weight: 1
        })
        .bindPopup(`
          <b>${p.name}</b><br>
          <b>Categoría:</b> ${p.categoria}<br>
          <b>Comuna:</b> ${p.comuna}<br>
          <b>H6:</b> ${p.h6}<br>
          <b>H8:</b> ${p.h8}
        `)
        .addTo(pointsLayer);
      });
    }

    function applyZoomMode(){
      const mode = document.getElementById('resolutionMode').value;
      const z = map.getZoom();

      map.removeLayer(h6Layer);
      map.removeLayer(h8Layer);
      map.removeLayer(pointsLayer);

      if(mode === 'h6' || (mode === 'auto' && z < 12)){
        map.addLayer(h6Layer);
      } else if(mode === 'h8' || (mode === 'auto' && z >= 12 && z < 15)){
        map.addLayer(h8Layer);
      } else {
        map.addLayer(pointsLayer);
      }

      updateStats();
    }

    function updateStats(){
      document.getElementById('statSoportes').textContent = currentData.length;

      const mode = document.getElementById('resolutionMode').value;
      const z = map.getZoom();

      let hexCount = 0;

      if(mode === 'h6' || (mode === 'auto' && z < 12)){
        hexCount = aggregate(currentData, 'h6').length;
      } else if(mode === 'h8' || (mode === 'auto' && z >= 12 && z < 15)){
        hexCount = aggregate(currentData, 'h8').length;
      }

      document.getElementById('statHex').textContent = hexCount;
    }

    function renderAll(){
      renderHex(h6Layer, aggregate(currentData, 'h6'), 'H6');
      renderHex(h8Layer, aggregate(currentData, 'h8'), 'H8');
      renderPoints(currentData);
      applyZoomMode();
    }

    function filterData(){
      const q = document.getElementById('searchInput').value.toLowerCase().trim();
      const comuna = document.getElementById('comunaFilter').value;
      const categoria = document.getElementById('categoriaFilter').value;

      currentData = allData.filter(x => {
        const okText = !q || (x.name || '').toLowerCase().includes(q);
        const okComuna = !comuna || (x.comuna || 'Sin comuna') === comuna;
        const okCategoria = !categoria || (x.categoria || 'Otros') === categoria;
        return okText && okComuna && okCategoria;
      });

      renderAll();
    }

    document.getElementById('searchInput').addEventListener('input', filterData);
    document.getElementById('comunaFilter').addEventListener('change', filterData);
    document.getElementById('categoriaFilter').addEventListener('change', filterData);
    document.getElementById('resolutionMode').addEventListener('change', applyZoomMode);

    document.getElementById('resetBtn').addEventListener('click', () => {
      map.setView([-33.45, -70.65], 11);
      document.getElementById('searchInput').value = '';
      document.getElementById('comunaFilter').value = '';
      document.getElementById('categoriaFilter').value = '';
      document.getElementById('resolutionMode').value = 'auto';
      currentData = [...allData];
      renderAll();
    });

    map.on('zoomend', applyZoomMode);

    const legend = L.control({ position: 'bottomright' });

    legend.onAdd = function(){
      const div = L.DomUtil.create('div', 'legend');
      div.innerHTML = `
        <b>Densidad</b><br>
        <span class="dot" style="background:#22c55e"></span>Baja<br>
        <span class="dot" style="background:#eab308"></span>Media<br>
        <span class="dot" style="background:#f97316"></span>Alta<br>
        <span class="dot" style="background:#dc2626"></span>Muy alta
      `;
      return div;
    };

    legend.addTo(map);

    loadData();
  </script>
</body>
</html>
